name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ─── Proto Lint & Breaking ─────────────────────────────────────────
  buf:
    name: Buf Lint & Breaking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-action@v1
        with:
          lint: true
          format: true
          breaking: true

  # ─── Rust Quality ──────────────────────────────────────────────────
  rust-check:
    name: Rust Quality
    needs: buf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - uses: arduino/setup-protoc@v3
        with:
          version: "28.x"
      - name: Format check
        run: cd rust && cargo fmt --check
      - name: Clippy (warnings = errors)
        run: cd rust && cargo clippy --all-targets -- -D warnings
      - name: Build
        run: cd rust && cargo build
      - name: Test
        run: cd rust && cargo test

  rust-build:
    name: Rust Build (${{ matrix.os }})
    needs: buf
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - uses: arduino/setup-protoc@v3
        with:
          version: "28.x"
      - name: Build
        run: cd rust && cargo build

  rust-msrv:
    name: Rust MSRV (stable)
    needs: buf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - uses: arduino/setup-protoc@v3
        with:
          version: "28.x"
      - name: Check MSRV compatibility
        run: cd rust && cargo check

  # ─── Rust Security & Dep Audit ─────────────────────────────────────
  rust-audit:
    name: Rust Security Audit
    needs: buf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2.0.0
        with:
          working-directory: rust
      - name: Install cargo-deny
        run: cargo install cargo-deny
      - name: Check licenses, advisories, duplicates
        run: cd rust && cargo deny check

  rust-extras:
    name: Rust Extras (machete, semver, typos)
    needs: buf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - uses: arduino/setup-protoc@v3
        with:
          version: "28.x"
      - name: Install extras
        run: cargo install cargo-machete cargo-semver-checks
      - name: Detect unused deps
        run: cd rust && cargo machete
      - name: Semver compatibility check
        run: cd rust && cargo semver-checks check-release || true
      - name: Typo check
        uses: crate-ci/typos@v1

  # ─── Core Workspace ───────────────────────────────────────────────
  core-check:
    name: Core Workspace Quality
    needs: buf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: arduino/setup-protoc@v3
        with:
          version: "28.x"
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy (warnings = errors)
        run: cargo clippy --workspace -- -D warnings
      - name: Build
        run: cargo build --workspace
      - name: Test
        run: cargo test --workspace

  core-build:
    name: Core Build (${{ matrix.os }})
    needs: buf
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - uses: arduino/setup-protoc@v3
        with:
          version: "28.x"
      - name: Build
        run: cargo build --workspace

  core-msrv:
    name: Core MSRV (1.85)
    needs: buf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - uses: arduino/setup-protoc@v3
        with:
          version: "28.x"
      - name: Check MSRV compatibility
        run: cargo check --workspace

  core-docs:
    name: Core Documentation
    needs: buf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - uses: arduino/setup-protoc@v3
        with:
          version: "28.x"
      - name: Build docs
        run: cargo doc --no-deps --workspace

  domain-deps-lint:
    name: Domain Zero-Dep Lint
    needs: buf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate domain crate dependencies
        run: |
          ALLOWED="serde serde_json chrono sha2 thiserror"
          DEPS=$(grep -A 100 '^\[dependencies\]' crates/agileplus-domain/Cargo.toml | grep -E '^\w' | grep -v '^\[' | cut -d'.' -f1 | cut -d' ' -f1)
          for dep in $DEPS; do
            if ! echo "$ALLOWED" | grep -qw "$dep"; then
              echo "ERROR: disallowed dependency '$dep' in agileplus-domain"
              exit 1
            fi
          done
          echo "Domain dependency check passed"

  # ─── Python Quality ────────────────────────────────────────────────
  python-check:
    name: Python Quality
    needs: buf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install uv
        run: pip install uv
      - name: Install package
        run: cd python && uv sync
      - name: Ruff format check
        run: cd python && uvx ruff format --check .
      - name: Ruff lint
        run: cd python && uvx ruff check .
      - name: pip-audit
        run: cd python && uvx pip-audit

  python-install:
    name: Python Install (${{ matrix.os }})
    needs: buf
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install uv
        run: pip install uv
      - name: Install package
        run: cd python && uv sync

  # ─── Config Lint ───────────────────────────────────────────────────
  config-lint:
    name: Config Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install taplo
        run: cargo install taplo-cli
      - name: TOML format check
        run: taplo format --check Cargo.toml rust/Cargo.toml python/pyproject.toml
      - name: actionlint
        uses: reviewdog/action-actionlint@v1

  # ─── Commit Lint ───────────────────────────────────────────────────
  commit-lint:
    name: Conventional Commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.yml
