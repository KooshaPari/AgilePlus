name: Promote Package

on:
  workflow_call:
    inputs:
      language:
        required: true
        type: string
        description: 'Programming language'
      registry:
        required: true
        type: string
        description: 'Package registry'
      from_channel:
        required: true
        type: string
        description: 'Source release channel'
      to_channel:
        required: true
        type: string
        description: 'Target release channel'
      risk_profile:
        required: true
        type: string
        description: 'Risk profile (low, medium, high)'
      version:
        required: true
        type: string
        description: 'Package version to promote'
    secrets:
      NPM_TOKEN:
        required: false
      PYPI_TOKEN:
        required: false
      CARGO_TOKEN:
        required: false

jobs:
  promote:
    runs-on: ubuntu-latest
    env:
      LANGUAGE: ${{ inputs.language }}
      REGISTRY: ${{ inputs.registry }}
      FROM_CHANNEL: ${{ inputs.from_channel }}
      TO_CHANNEL: ${{ inputs.to_channel }}
      RISK_PROFILE: ${{ inputs.risk_profile }}
      VERSION: ${{ inputs.version }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2

      - name: Run gate check
        run: |
          mise run lint
          mise run test
          if [ "$TO_CHANNEL" = "stable" ] || [ "$RISK_PROFILE" = "high" ]; then
            mise run audit
          fi

      - name: Publish if gates pass
        run: |
          case "$REGISTRY" in
            npm) npm publish --tag "$TO_CHANNEL" ;;
            pypi) twine upload dist/* ;;
            crates.io) cargo publish ;;
          esac

      - name: Promotion result
        run: |
          echo "✓ Package promoted from $FROM_CHANNEL to $TO_CHANNEL"
          echo "  Version: $VERSION"
          echo "  Language: $LANGUAGE"
          echo "  Registry: $REGISTRY"
