<div id="event-timeline-{{ feature_id }}"
     class="space-y-3">
  {% for event in events %}
    <div class="timeline-event flex gap-3 items-start"
         data-kind="{{ event.kind }}">
      <!-- Color-coded left indicator -->
      <div class="flex-shrink-0 flex flex-col items-center pt-1">
        <span class="timeline-dot timeline-dot-{{ event.kind }} w-2 h-2 rounded-full mt-1"></span>
        <div class="timeline-line w-px flex-1 min-h-[1rem] bg-zinc-700 mt-1"></div>
      </div>
      <div class="flex-1 pb-3">
        <div class="flex items-center gap-2 flex-wrap">
          <span class="event-kind-badge event-kind-{{ event.kind }} text-xs px-1.5 py-0.5 rounded font-mono uppercase tracking-wider">
            {{ event.kind }}
          </span>
          <span class="text-xs text-zinc-500 font-mono">{{ event.timestamp }}</span>
        </div>
        <p class="text-sm text-zinc-200 mt-1">{{ event.description }}</p>
      </div>
    </div>
  {% endfor %}
  {% if events.is_empty() %}
    <p class="text-zinc-500 text-sm text-center py-6">No events recorded yet.</p>
  {% endif %}
</div>
