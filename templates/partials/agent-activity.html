<div id="agent-activity" class="space-y-2 text-sm">
  <h3 class="font-bold text-zinc-300 text-xs uppercase tracking-widest border-b border-zinc-700 pb-1">
    Agent Activity
  </h3>
  {% for agent in agents %}
    <div class="agent-row flex items-start gap-2 py-1 border-b border-zinc-800">
      <span class="agent-status-dot agent-status-{{ agent.status }} w-2 h-2 rounded-full flex-shrink-0 mt-1.5"></span>
      <div class="flex-1 min-w-0">
        <div class="flex items-center justify-between gap-1">
          <span class="font-mono text-xs text-zinc-200 truncate">{{ agent.name }}</span>
          <span class="agent-badge agent-badge-{{ agent.status }} text-xs px-1 py-0 rounded uppercase flex-shrink-0">
            {{ agent.status }}
          </span>
        </div>
        {% if !agent.current_task.is_empty() %}
          <p class="text-xs text-zinc-400 truncate mt-0.5">{{ agent.current_task }}</p>
        {% endif %}
        <p class="text-xs text-zinc-600 mt-0.5">{{ agent.last_action }}</p>
      </div>
    </div>
  {% endfor %}
  {% if agents.is_empty() %}
    <p class="text-zinc-500 text-xs text-center py-2">No active agents.</p>
  {% endif %}
</div>
