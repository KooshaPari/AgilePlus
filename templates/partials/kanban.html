<div id="kanban-board"
     hx-get="/api/dashboard/kanban"
     hx-trigger="load, sse:feature_updated"
     class="flex gap-4 p-4 overflow-x-auto">
  {% for (state, col_cards) in cards %}
    <div class="kanban-column min-w-[20rem] bg-zinc-800 rounded border border-zinc-700 flex-shrink-0">
      <h3 class="px-4 py-2 font-mono font-bold border-b border-zinc-700 capitalize text-sm">
        {{ state }} ({{ col_cards.len() }})
      </h3>
      <div class="p-2 space-y-2 min-h-[8rem]" data-state="{{ state }}">
        {% for feature in col_cards %}
          {% include "partials/feature-card.html" %}
        {% endfor %}
      </div>
    </div>
  {% endfor %}
</div>
